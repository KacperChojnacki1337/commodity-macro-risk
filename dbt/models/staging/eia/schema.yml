version: 2

models:
  - name: stg_eia__petroleum_spot
    description: >
      EIA petroleum spot prices (WTI RWTC, Brent RBRTE, ...), typed and deduped.
      Grain: one row per (price_date, series). Price is USD per barrel.
    columns:
      - name: price_key
        description: Surrogate key over (price_date, series).
        tests: [unique, not_null]
      - name: price_date
        tests: [not_null]
      - name: series
        description: EIA series code (RWTC = WTI, RBRTE = Brent).
        tests: [not_null]
      - name: product_name
        description: Human-readable product name.
      - name: price
        description: Spot price, USD per barrel (decimal, not float).
        tests: [not_null]
      - name: units
        description: Price units as reported by EIA.
