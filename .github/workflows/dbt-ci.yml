name: dbt CI

# PR-only test: builds the dbt project against the DEV target (the zero-copy
# clone) so changes are validated before merge. Deploying to prod on merge is a
# separate workflow (dbt-deploy-prod.yml). Skips cleanly when Snowflake secrets
# are absent (so the repo stays green when no warehouse is attached).
on:
  pull_request:
    branches: [main]
    paths: ["dbt/**"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  dbt-build:
    name: dbt-build
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Detect dbt project and Snowflake secrets
        id: check
        env:
          ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
        run: |
          if [ ! -f dbt/dbt_project.yml ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No dbt project (dbt/dbt_project.yml missing) -- skipping."
          elif [ -z "$ACCOUNT" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Snowflake secrets not configured -- skipping dbt build."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt (Snowflake adapter)
        if: steps.check.outputs.run == 'true'
        run: pip install dbt-snowflake

      # profiles.yml is gitignored (local convenience); the committed template
      # is credential-free, so CI just materializes it and injects secrets as
      # environment variables.
      - name: Materialize profiles.yml from the template
        if: steps.check.outputs.run == 'true'
        working-directory: dbt
        run: cp profiles.example.yml profiles.yml

      - name: dbt build (dev target)
        if: steps.check.outputs.run == 'true'
        working-directory: dbt
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
        run: |
          dbt deps
          dbt build --profiles-dir . --target dev
          # Gate: docs must generate cleanly (catches broken refs / bad yaml).
          dbt docs generate --profiles-dir . --target dev
