name: dbt deploy (prod)

# Closes the CI/CD loop: PR builds test on the dev clone (dbt-ci.yml); merging to
# main deploys the same models to PROD, so production always reflects main.
# Runs `dbt build --target prod` (database COMMODITY_RISK) on push to main.
on:
  push:
    branches: [main]
    paths: ["dbt/**"]
  workflow_dispatch: {}

# Never run two prod deploys at once.
concurrency:
  group: dbt-deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dbt-deploy-prod:
    name: dbt-deploy-prod
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Check whether Snowflake is configured
        id: check
        env:
          ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
        run: |
          if [ -f dbt/dbt_project.yml ] && [ -n "$ACCOUNT" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Snowflake not configured (or no dbt project) -- skipping prod deploy."
          fi

      - name: Set up Python
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt (Snowflake adapter)
        if: steps.check.outputs.run == 'true'
        run: pip install dbt-snowflake

      - name: Materialize profiles.yml from the template
        if: steps.check.outputs.run == 'true'
        working-directory: dbt
        run: cp profiles.example.yml profiles.yml

      # Same models, PROD target (database COMMODITY_RISK) — this is the deploy.
      - name: dbt build (prod target)
        if: steps.check.outputs.run == 'true'
        working-directory: dbt
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
        run: dbt build --profiles-dir . --target prod
